<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>KiddoMap — Planes con niños, cerca de ti</title>
<meta name="description" content="Descubre parques, museos, salones de juego y eventos para niños cerca de ti, clasificados por edades. / Find kid-friendly places and events near you, sorted by age group.">
<meta name="theme-color" content="#FF6B5E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KiddoMap">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --bg:#FFFDF6; --card:#FFFFFF; --ink:#20304F; --ink2:#5B6B8C;
  --brand:#FF6B5E; --brand-dark:#E8564A; --teal:#1FA79A; --teal-soft:#E2F5F3;
  --sun:#FFC94D; --sun-soft:#FFF3D6; --line:#EEE8DA; --coral-soft:#FFE9E6;
  --ok:#2E9E5B; --closed:#C64B41; --lock:#9AA6BF;
  --r:18px; --shadow:0 6px 24px rgba(32,48,79,.10);
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Nunito',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
  height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:15px}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select{font-family:inherit;font-size:15px}
.hidden{display:none!important}

/* ---------- Header ---------- */
header{padding:calc(8px + var(--safe-t)) 14px 8px;display:flex;align-items:center;gap:8px;background:var(--bg);z-index:30}
.logo{display:flex;align-items:center;gap:7px;font-weight:900;font-size:19px;letter-spacing:-.3px}
.logo .pin{width:30px;height:30px;border-radius:50% 50% 50% 4px;background:var(--brand);display:flex;align-items:center;justify-content:center;transform:rotate(-8deg);box-shadow:0 3px 8px rgba(255,107,94,.4)}
.logo .pin span{font-size:15px;transform:rotate(8deg)}
.logo em{font-style:normal;color:var(--brand)}
.hbtns{margin-left:auto;display:flex;gap:6px;align-items:center}
.chip-btn{background:var(--card);border:1.5px solid var(--line);border-radius:99px;padding:6px 11px;font-weight:800;font-size:12.5px;color:var(--ink2)}
.chip-btn.premium{background:linear-gradient(120deg,var(--sun),#FFB020);border-color:transparent;color:#5C3A00}
.bell{position:relative;font-size:19px;padding:4px 6px}
.bell .dot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:var(--brand);border:2px solid var(--bg)}

/* ---------- Filters ---------- */
.filters{padding:2px 0 8px;background:var(--bg);z-index:25}
.chiprow{display:flex;gap:7px;overflow-x:auto;padding:3px 14px;scrollbar-width:none}
.chiprow::-webkit-scrollbar{display:none}
.fchip{flex:0 0 auto;background:var(--card);border:1.5px solid var(--line);border-radius:99px;padding:6px 12px;font-weight:800;font-size:13px;color:var(--ink2);display:flex;gap:5px;align-items:center;transition:all .15s}
.fchip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.fchip.age.on{background:var(--teal);border-color:var(--teal)}

/* ---------- Views ---------- */
main{flex:1;position:relative;overflow:hidden}
.view{position:absolute;inset:0;display:none;flex-direction:column}
.view.active{display:flex}
#map{flex:1;z-index:1;background:#DCEEE8}
.map-fabs{position:absolute;right:12px;bottom:18px;z-index:20;display:flex;flex-direction:column;gap:10px}
.fab{width:46px;height:46px;border-radius:50%;background:var(--card);box-shadow:var(--shadow);font-size:20px;display:flex;align-items:center;justify-content:center}
.fab.primary{background:var(--brand);color:#fff}
.map-top{position:absolute;left:12px;right:12px;top:10px;z-index:20;display:flex;gap:8px}
.searchbar{flex:1;background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:10px 14px;display:flex;gap:8px;align-items:center;font-weight:700;color:var(--ink2);font-size:14px;border:1.5px solid var(--line)}
.radius-sel{background:var(--card);border:1.5px solid var(--line);border-radius:14px;box-shadow:var(--shadow);font-weight:800;font-size:13px;padding:0 8px;color:var(--ink)}
.count-pill{position:absolute;left:50%;transform:translateX(-50%);bottom:22px;z-index:20;background:var(--ink);color:#fff;border-radius:99px;padding:8px 16px;font-weight:800;font-size:13px;box-shadow:var(--shadow)}

.scroll{flex:1;overflow-y:auto;padding:10px 14px calc(16px + var(--safe-b));-webkit-overflow-scrolling:touch}

/* ---------- Cards ---------- */
.pcard{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:13px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:center}
.pcard .cicon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0}
.pcard .info{flex:1;min-width:0}
.pcard h3{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{font-size:12.5px;color:var(--ink2);font-weight:700;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{border-radius:7px;padding:1.5px 7px;font-size:11px;font-weight:800}
.badge.age{background:var(--teal-soft);color:var(--teal)}
.badge.open{background:#E3F4E9;color:var(--ok)}
.badge.closed{background:#FBE9E7;color:var(--closed)}
.badge.demo{background:var(--sun-soft);color:#8A6100}
.dist{font-weight:900;color:var(--brand);font-size:13px;flex-shrink:0;text-align:right}
.dist small{display:block;color:var(--ink2);font-weight:700;font-size:11px}

/* ---------- Empty / loading ---------- */
.state-box{text-align:center;padding:44px 26px;color:var(--ink2)}
.state-box .big{font-size:44px;margin-bottom:10px}
.state-box h3{color:var(--ink);margin-bottom:6px;font-size:17px}
.state-box p{font-weight:600;font-size:14px;line-height:1.45}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--brand);color:#fff;font-weight:800;font-size:15px;border-radius:14px;padding:13px 22px;box-shadow:0 4px 14px rgba(255,107,94,.35)}
.btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);box-shadow:none}
.btn.small{padding:9px 16px;font-size:13.5px;border-radius:11px}
.btn.teal{background:var(--teal);box-shadow:0 4px 14px rgba(31,167,154,.3)}
.btn:disabled{opacity:.5}
.spinner{width:26px;height:26px;border:3.5px solid var(--coral-soft);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spinner{animation:none}}

/* ---------- Bottom nav ---------- */
nav{display:flex;background:var(--card);border-top:1.5px solid var(--line);padding:6px 4px calc(6px + var(--safe-b));z-index:30}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;font-weight:800;color:var(--lock);padding:4px 0}
nav button .ico{font-size:21px;line-height:1}
nav button.on{color:var(--brand)}

/* ---------- Sheet ---------- */
.overlay{position:fixed;inset:0;background:rgba(23,32,54,.45);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:24px 24px 0 0;z-index:41;transform:translateY(105%);transition:transform .25s ease;max-height:88vh;max-height:88dvh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(0,0,0,.18)}
.sheet.show{transform:translateY(0)}
.sheet-grab{width:44px;height:5px;border-radius:99px;background:var(--line);margin:10px auto 2px;flex-shrink:0}
.sheet-body{overflow-y:auto;padding:10px 18px calc(22px + var(--safe-b));-webkit-overflow-scrolling:touch}
.sheet-head{display:flex;gap:13px;align-items:flex-start;margin-bottom:12px}
.sheet-head .cicon{width:54px;height:54px;border-radius:16px;font-size:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sheet-head h2{font-size:19px;font-weight:900;line-height:1.2}
.inforow{display:flex;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line);font-weight:700;font-size:14px;align-items:flex-start}
.inforow .ic{width:22px;text-align:center;flex-shrink:0;font-size:16px}
.inforow .val{color:var(--ink2);line-height:1.4;font-weight:600}
.actions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:14px 0 4px}
.act{background:var(--bg);border:1.5px solid var(--line);border-radius:15px;padding:11px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;font-weight:800;font-size:11.5px;color:var(--ink);position:relative}
.act .ico{font-size:20px}
.act .lockic{position:absolute;top:6px;right:7px;font-size:11px}
.act.locked{color:var(--ink2)}
.act:active{transform:scale(.96)}

/* ---------- Reviews ---------- */
.review{background:var(--bg);border:1.5px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px}
.review .rh{display:flex;justify-content:space-between;font-weight:800;font-size:13px;margin-bottom:3px}
.review .stars{color:var(--sun);letter-spacing:1px}
.review p{font-size:13.5px;color:var(--ink2);font-weight:600;line-height:1.4}

/* ---------- Paywall ---------- */
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.modal .mcard{background:var(--card);border-radius:26px 26px 0 0;width:100%;max-width:520px;max-height:92vh;max-height:92dvh;overflow-y:auto;padding:12px 22px calc(24px + var(--safe-b));position:relative;z-index:51}
.modal .mbg{position:absolute;inset:0;background:rgba(23,32,54,.5)}
.mclose{position:absolute;top:14px;right:16px;font-size:16px;background:var(--bg);border-radius:50%;width:32px;height:32px;font-weight:900;color:var(--ink2);z-index:5}
.pay-hero{text-align:center;padding:18px 0 6px}
.pay-hero .crown{font-size:44px}
.pay-hero h2{font-size:22px;font-weight:900;margin:6px 0 2px}
.pay-hero .price{font-size:15px;color:var(--ink2);font-weight:700}
.pay-hero .price b{color:var(--brand);font-size:24px;font-weight:900}
.perk{display:flex;gap:11px;align-items:center;padding:9px 0;font-weight:700;font-size:14px}
.perk .pi{width:36px;height:36px;border-radius:12px;background:var(--coral-soft);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.finefine{font-size:11.5px;color:var(--lock);font-weight:600;text-align:center;margin-top:10px;line-height:1.5}

/* ---------- Events ---------- */
.ecard{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.ecard .etop{padding:13px 15px 11px;display:flex;gap:12px}
.edate{width:52px;flex-shrink:0;background:var(--coral-soft);border-radius:13px;text-align:center;padding:7px 0;height:fit-content}
.edate .d{font-size:19px;font-weight:900;color:var(--brand);line-height:1.1}
.edate .m{font-size:11px;font-weight:800;color:var(--brand-dark);text-transform:uppercase}
.ecard h3{font-size:15px;font-weight:800;margin-bottom:3px}
.ecard .ebtns{display:flex;gap:8px;padding:0 15px 13px}
.ecard .ebtns .btn{flex:1}

/* ---------- Agenda ---------- */
.agroup{margin-bottom:16px}
.agroup .ah{font-weight:900;font-size:13px;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.aitem{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:11px 14px;margin-bottom:8px;display:flex;gap:11px;align-items:center}
.aitem .at{font-weight:900;color:var(--brand);font-size:14px;flex-shrink:0}
.aitem .an{flex:1;font-weight:800;font-size:14px}
.aitem .del{color:var(--lock);font-size:16px;padding:4px}

/* ---------- Profile ---------- */
.prow{background:var(--card);border:1.5px solid var(--line);border-radius:15px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;font-weight:800;font-size:14.5px}
.prow .ico{font-size:20px;width:26px;text-align:center}
.prow .sub{display:block;font-size:12px;color:var(--ink2);font-weight:600;margin-top:1px}
.prow .end{margin-left:auto;color:var(--ink2);font-weight:700;font-size:13px}
.sectitle{font-weight:900;font-size:13px;color:var(--ink2);text-transform:uppercase;letter-spacing:.6px;margin:16px 2px 8px}

/* ---------- Onboarding ---------- */
#onboard{position:fixed;inset:0;background:linear-gradient(160deg,#FFF6EC,#FFE9E6 55%,#E2F5F3);z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 28px calc(30px + var(--safe-b));text-align:center}
#onboard .biglogo{width:86px;height:86px;border-radius:50% 50% 50% 8px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:42px;transform:rotate(-8deg);box-shadow:0 10px 30px rgba(255,107,94,.45);margin-bottom:18px}
#onboard h1{font-size:30px;font-weight:900;letter-spacing:-.5px}
#onboard h1 em{font-style:normal;color:var(--brand)}
#onboard .tag{font-size:15.5px;color:var(--ink2);font-weight:700;margin:8px 0 22px;line-height:1.45;max-width:320px}
.ob-perks{display:flex;flex-direction:column;gap:11px;margin-bottom:26px;text-align:left}
.ob-perks div{display:flex;gap:10px;align-items:center;font-weight:800;font-size:14.5px}
.ob-perks .pi{width:34px;height:34px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(32,48,79,.08)}
#onboard .btn{width:100%;max-width:330px;margin-bottom:10px}

/* ---------- Search modal ---------- */
.search-list button{display:flex;width:100%;text-align:left;gap:10px;padding:12px 8px;border-bottom:1px solid var(--line);font-weight:700;font-size:14px;align-items:center}
.search-input{width:100%;border:2px solid var(--line);border-radius:14px;padding:12px 15px;font-weight:700;margin:8px 0 10px;background:var(--bg)}
.search-input:focus{outline:none;border-color:var(--teal)}
.qchips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px}

/* ---------- Toast ---------- */
#toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(86px + var(--safe-b));background:var(--ink);color:#fff;font-weight:800;font-size:13.5px;border-radius:13px;padding:11px 18px;z-index:70;opacity:0;pointer-events:none;transition:all .25s;max-width:86vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- Stars input ---------- */
.starpick{display:flex;gap:8px;justify-content:center;font-size:30px;margin:10px 0}
.starpick button{filter:grayscale(1);opacity:.45;transition:all .15s}
.starpick button.on{filter:none;opacity:1;transform:scale(1.12)}
textarea.rev-in{width:100%;border:2px solid var(--line);border-radius:14px;padding:12px;font-weight:600;min-height:90px;background:var(--bg);resize:none}
textarea.rev-in:focus{outline:none;border-color:var(--teal)}
.leaflet-div-icon{background:none;border:none}
.kmark{width:34px;height:34px;border-radius:50% 50% 50% 5px;display:flex;align-items:center;justify-content:center;font-size:16px;transform:rotate(-8deg);box-shadow:0 3px 8px rgba(0,0,0,.25);border:2.5px solid #fff}
.kmark span{transform:rotate(8deg)}
.notif{display:flex;gap:11px;padding:12px 4px;border-bottom:1px solid var(--line);font-size:13.5px;font-weight:600;color:var(--ink2);align-items:flex-start}
.notif .ni{font-size:19px;flex-shrink:0}
.notif b{color:var(--ink);display:block;font-size:14px}
label.flabel{font-weight:800;font-size:13px;display:block;margin:10px 0 5px;color:var(--ink2)}
input.fin{width:100%;border:2px solid var(--line);border-radius:13px;padding:11px 13px;font-weight:700;background:var(--bg)}
input.fin:focus{outline:none;border-color:var(--teal)}
</style>
</head>
<body>

<div id="onboard">
  <div class="biglogo"><span style="transform:rotate(8deg)">🧒</span></div>
  <h1>Kiddo<em>Map</em></h1>
  <p class="tag" data-i18n="ob_tag"></p>
  <div class="ob-perks">
    <div><span class="pi">🗺️</span><span data-i18n="ob_p1"></span></div>
    <div><span class="pi">🎯</span><span data-i18n="ob_p2"></span></div>
    <div><span class="pi">🎪</span><span data-i18n="ob_p3"></span></div>
  </div>
  <button class="btn" id="ob-geo"><span>📍</span><span data-i18n="ob_use_loc"></span></button>
  <button class="btn ghost" id="ob-search"><span>🔎</span><span data-i18n="ob_search_city"></span></button>
  <button class="chip-btn" id="ob-lang" style="margin-top:14px">EN</button>
</div>

<header>
  <div class="logo"><div class="pin"><span>🧒</span></div><span>Kiddo<em>Map</em></span></div>
  <div class="hbtns">
    <button class="bell" id="btn-notif">🔔<span class="dot hidden" id="notif-dot"></span></button>
    <button class="chip-btn" id="btn-lang">EN</button>
    <button class="chip-btn" id="btn-premium">✨ <span data-i18n="go_premium"></span></button>
  </div>
</header>

<div class="filters">
  <div class="chiprow" id="age-chips"></div>
  <div class="chiprow" id="cat-chips" style="margin-top:6px"></div>
</div>

<main>
  <section class="view active" id="view-map">
    <div id="map"></div>
    <div class="map-top">
      <button class="searchbar" id="map-search">🔎 <span id="loc-label" data-i18n="search_ph"></span></button>
      <select class="radius-sel" id="radius">
        <option value="2000">2 km</option>
        <option value="5000" selected>5 km</option>
        <option value="10000">10 km</option>
        <option value="20000">20 km</option>
      </select>
    </div>
    <div class="map-fabs">
      <button class="fab" id="fab-locate">📍</button>
      <button class="fab primary" id="fab-reload">↻</button>
    </div>
    <button class="count-pill hidden" id="count-pill"></button>
  </section>

  <section class="view" id="view-list"><div class="scroll" id="list-scroll"></div></section>
  <section class="view" id="view-events"><div class="scroll" id="events-scroll"></div></section>
  <section class="view" id="view-agenda"><div class="scroll" id="agenda-scroll"></div></section>
  <section class="view" id="view-profile"><div class="scroll" id="profile-scroll"></div></section>
</main>

<nav>
  <button data-view="map" class="on"><span class="ico">🗺️</span><span data-i18n="nav_map"></span></button>
  <button data-view="list"><span class="ico">📋</span><span data-i18n="nav_list"></span></button>
  <button data-view="events"><span class="ico">🎪</span><span data-i18n="nav_events"></span></button>
  <button data-view="agenda"><span class="ico">📅</span><span data-i18n="nav_agenda"></span></button>
  <button data-view="profile"><span class="ico">👤</span><span data-i18n="nav_profile"></span></button>
</nav>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet"><div class="sheet-grab"></div><div class="sheet-body" id="sheet-body"></div></div>

<div class="modal" id="paywall"><div class="mbg" data-close="paywall"></div><div class="mcard" id="paywall-body"></div></div>
<div class="modal" id="search-modal"><div class="mbg" data-close="search-modal"></div><div class="mcard" id="search-body"></div></div>
<div class="modal" id="notif-modal"><div class="mbg" data-close="notif-modal"></div><div class="mcard" id="notif-body"></div></div>
<div class="modal" id="review-modal"><div class="mbg" data-close="review-modal"></div><div class="mcard" id="review-body"></div></div>
<div class="modal" id="sched-modal"><div class="mbg" data-close="sched-modal"></div><div class="mcard" id="sched-body"></div></div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="app.js"></script>
</body>
</html>
